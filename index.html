<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>A股行情看板</title><style>:root{--red:#d92d20;--green:#079455;--blue:#175cd3;--bg:#f5f7fb;--card:#fff;--ink:#182230;--muted:#667085;--line:#d9e2ec;--amber:#b54708}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;line-height:1.45}main{max-width:1080px;margin:auto;padding:14px 10px 36px}header{background:linear-gradient(135deg,#175cd3,#0b2f6b);color:#fff;border-radius:18px;padding:18px 15px;box-shadow:0 12px 30px #1018281f}h1{font-size:25px;margin:0 0 6px}h2{font-size:19px;margin:0 0 12px}section{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:12px 0;box-shadow:0 6px 20px #1018280d}.top{display:grid;grid-template-columns:1.05fr 1.95fr;gap:12px}.count{background:#eff6ff;border:1px solid #bfdbfe;border-radius:14px;padding:13px}.count strong{display:block;font-size:32px;color:var(--blue)}.small{font-size:12px;color:var(--muted)}button{border:0;border-radius:999px;background:var(--blue);color:#fff;padding:9px 14px;font-size:14px}.marketGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.statusCard{border:1px solid var(--line);border-radius:14px;padding:11px;background:#fbfdff}.status{font-size:20px;font-weight:800}.open{color:var(--red)}.closed{color:var(--green)}.pause{color:var(--amber)}.idxGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.idx{border:1px solid var(--line);border-radius:12px;padding:9px;background:#fbfdff;min-height:96px}.idxName{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.idxCode{font-size:10px;color:var(--muted);margin-left:3px}.idxPrice{font-size:20px;font-weight:900;margin:3px 0}.idxMeta{font-size:12px;font-weight:700}.red{color:var(--red)!important}.green{color:var(--green)!important}.muted{color:var(--muted)}.boards{display:grid;grid-template-columns:1fr 1fr;gap:12px}.rank{width:100%;border-collapse:collapse}.rank th,.rank td{padding:9px 6px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}.rank th{color:var(--muted);font-weight:600}.rank td:last-child,.rank th:last-child{text-align:right}.err{color:var(--amber)}@media(max-width:760px){main{padding:10px 7px 28px}.top,.boards{grid-template-columns:1fr}.idxGrid{grid-template-columns:repeat(3,1fr);gap:5px}.idx{padding:6px;min-height:88px}.idxName{font-size:11px}.idxCode{display:block;margin-left:0}.idxPrice{font-size:15px}.idxMeta{font-size:10px}.marketGrid{grid-template-columns:repeat(3,1fr);gap:6px}.statusCard{padding:8px}.status{font-size:17px}.count strong{font-size:28px}.rank th,.rank td{font-size:13px;padding:8px 4px}h1{font-size:22px}}</style></head><body><main><header><h1>A股行情看板</h1><p>5分钟自动刷新页面，重新获取行情和板块排行。</p><p class="small" style="color:rgba(255,255,255,.82)">红色为上涨/领涨，绿色为下跌/领跌；行情来自公开接口，可能存在延迟。</p></header><section class="top"><div class="count"><div class="small">距离下次刷新</div><strong id="countdown">5:00</strong><div class="small" id="nextTime">计算中...</div><p><button onclick="location.reload()">立即刷新</button></p></div><div><h2>开市 / 休市</h2><div class="marketGrid"><div class="statusCard"><b>A股</b><div id="cnStatus" class="status">--</div><div id="cnHint" class="small"></div></div><div class="statusCard"><b>港股</b><div id="hkStatus" class="status">--</div><div id="hkHint" class="small"></div></div><div class="statusCard"><b>美股</b><div id="usStatus" class="status">--</div><div id="usHint" class="small"></div></div></div></div></section><section><h2>行情信息</h2><div id="quoteTime" class="small">正在获取行情...</div><div id="indices" class="idxGrid"></div></section><section><div class="boards"><div><h2>领涨板块排行</h2><table class="rank"><thead><tr><th>排名</th><th>板块</th><th>涨幅</th></tr></thead><tbody id="upBoards"><tr><td colspan="3">加载中...</td></tr></tbody></table></div><div><h2>领跌板块排行</h2><table class="rank"><thead><tr><th>排名</th><th>板块</th><th>跌幅</th></tr></thead><tbody id="downBoards"><tr><td colspan="3">加载中...</td></tr></tbody></table></div></div></section></main><script>const REFRESH_SECONDS=300,startedAt=Date.now(),nextAt=startedAt+REFRESH_SECONDS*1000,$=id=>document.getElementById(id),pad=n=>String(n).padStart(2,'0');const targets=[['1.000001','上证指数'],['0.399006','创业板指'],['1.000688','科创50'],['1.000300','沪深300'],['124.HSTECH','恒生科技指数'],['100.NDX','纳斯达克100'],['1.512480','半导体ETF国联安'],['0.159819','人工智能ETF易方达'],['1.518880','黄金ETF华安']];function jsonp(url){return new Promise((resolve,reject)=>{const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);window[cb]=d=>{delete window[cb];s.remove();resolve(d)};const s=document.createElement('script');s.onerror=()=>{delete window[cb];s.remove();reject(Error('接口失败'))};s.src=url+(url.includes('?')?'&':'?')+'cb='+cb;document.body.appendChild(s);setTimeout(()=>{if(window[cb]){delete window[cb];s.remove();reject(Error('接口超时'))}},9000)})}function cls(v){return Number(v)>=0?'red':'green'}function fmt(v,d=2){return v===undefined||v===null||v==='-'?'--':Number(v).toFixed(d)}function money(v){if(v==='-'||v==null)return'--';v=Number(v);if(v>=1e8)return(v/1e8).toFixed(1)+'亿';if(v>=1e4)return(v/1e4).toFixed(1)+'万';return v.toFixed(0)}function parts(date,tz){const f=new Intl.DateTimeFormat('en-US',{timeZone:tz,weekday:'short',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}),o={};f.formatToParts(date).forEach(p=>o[p.type]=p.value);return o}function mins(p){return Number(p.hour)*60+Number(p.minute)}function weekday(p){return!['Sat','Sun'].includes(p.weekday)}function setStatus(k,state,hint){const el=$(k+'Status');el.textContent=state;el.className='status '+(state==='开市'?'open':state==='午间休市'?'pause':'closed');$(k+'Hint').textContent=hint}function marketStatus(){const now=new Date();let p=parts(now,'Asia/Shanghai'),m=mins(p),d=weekday(p);if(!d)setStatus('cn','休市','周末');else if(m>=570&&m<690)setStatus('cn','开市','09:30-11:30');else if(m>=690&&m<780)setStatus('cn','午间休市','13:00继续');else if(m>=780&&m<900)setStatus('cn','开市','13:00-15:00');else setStatus('cn','休市','常规09:30-15:00');p=parts(now,'Asia/Hong_Kong');m=mins(p);d=weekday(p);if(!d)setStatus('hk','休市','周末');else if(m>=570&&m<720)setStatus('hk','开市','09:30-12:00');else if(m>=720&&m<780)setStatus('hk','午间休市','13:00继续');else if(m>=780&&m<960)setStatus('hk','开市','13:00-16:00');else setStatus('hk','休市','常规09:30-16:00');p=parts(now,'America/New_York');m=mins(p);d=weekday(p);if(!d)setStatus('us','休市','美东周末');else if(m>=570&&m<960)setStatus('us','开市','美东09:30-16:00');else setStatus('us','休市','美东09:30-16:00')}async function loadIndices(){try{const secids=targets.map(t=>t[0]).join(','),url='https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&invt=2&fields=f12,f14,f2,f3,f4,f6&secids='+secids,d=await jsonp(url),map=new Map((d?.data?.diff||[]).map(x=>[x.f12,x]));$('quoteTime').textContent='更新时间：'+new Date().toLocaleString('zh-CN');$('indices').innerHTML=targets.map(([secid,name])=>{const code=secid.split('.')[1],x=map.get(code);if(!x)return`<div class="idx"><div class="idxName">${name}<span class="idxCode">${code}</span></div><div class="idxPrice muted">--</div><div class="small">暂无数据</div></div>`;return`<div class="idx"><div class="idxName">${name}<span class="idxCode">${x.f12}</span></div><div class="idxPrice ${cls(x.f3)}">${fmt(x.f2,x.f2<10?3:2)}</div><div class="idxMeta ${cls(x.f3)}">${fmt(x.f3)}%　${fmt(x.f4,x.f2<10?3:2)}</div><div class="small">成交额 ${money(x.f6)}</div></div>`}).join('')}catch(e){$('quoteTime').innerHTML='<span class="err">行情获取失败，5分钟后自动重试。</span>'}}async function loadBoards(){const fields='f12,f14,f3,f2',base='https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=10&np=1&fltt=2&invt=2&ut=bd1d9ddb04089700cf9c27f6f7426281&fs=m:90+t:2&fields='+fields;try{let up=await jsonp(base+'&fid=f3&po=1'),down=await jsonp(base+'&fid=f3&po=0');renderBoards('upBoards',up?.data?.diff||[],true);renderBoards('downBoards',down?.data?.diff||[],false)}catch(e){$('upBoards').innerHTML='<tr><td colspan="3" class="err">板块数据获取失败</td></tr>';$('downBoards').innerHTML='<tr><td colspan="3" class="err">板块数据获取失败</td></tr>'}}function renderBoards(id,arr,isUp){$(id).innerHTML=arr.map((x,i)=>`<tr><td>${i+1}</td><td>${x.f14}<br><span class="small">${x.f12}</span></td><td class="${isUp?'red':'green'}">${fmt(x.f3)}%</td></tr>`).join('')||'<tr><td colspan="3">暂无数据</td></tr>'}function updateClock(){const left=Math.max(0,Math.ceil((nextAt-Date.now())/1000));$('countdown').textContent=`${Math.floor(left/60)}:${pad(left%60)}（${left}秒）`;const d=new Date(nextAt);$('nextTime').textContent=`预计刷新：${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;document.title=`${left}秒后刷新 · A股行情看板`;marketStatus();if(left<=0)location.reload()}updateClock();setInterval(updateClock,1000);loadIndices();loadBoards();</script></body></html>
