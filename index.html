<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>A股行情看板</title><style>:root{--red:#d92d20;--green:#079455;--blue:#175cd3;--bg:#f5f7fb;--card:#fff;--ink:#182230;--muted:#667085;--line:#d9e2ec;--amber:#b54708;--soft:#fbfdff}body.dark{--bg:#0b1220;--card:#101828;--ink:#e5e7eb;--muted:#98a2b3;--line:#344054;--soft:#111827}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;line-height:1.45}main{max-width:1080px;margin:auto;padding:14px 10px 36px}header{background:linear-gradient(135deg,#175cd3,#0b2f6b);color:#fff;border-radius:18px;padding:18px 15px;box-shadow:0 12px 30px #1018281f}.headerTop{display:flex;align-items:center;justify-content:space-between;gap:12px}h1{font-size:25px;margin:0 0 6px}h2{font-size:19px;margin:0 0 12px}section{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:12px 0;box-shadow:0 6px 20px #1018280d}.top{display:grid;grid-template-columns:1.05fr 1.95fr;gap:12px}.count{background:#eff6ff;border:1px solid #bfdbfe;border-radius:14px;padding:13px}.count strong{display:block;font-size:32px;color:var(--blue)}.small{font-size:12px;color:var(--muted)}button{border:0;border-radius:999px;background:var(--blue);color:#fff;padding:9px 14px;font-size:14px}.themeBtn{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);color:#fff;white-space:nowrap;padding:8px 13px}.themeBtn:active{transform:scale(.98)}.marketGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.statusCard{border:1px solid var(--line);border-radius:14px;padding:11px;background:var(--soft)}.status{font-size:20px;font-weight:800}.open{color:var(--red)}.closed{color:var(--green)}.pause{color:var(--amber)}.idxGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.idx{border:1px solid var(--line);border-radius:12px;padding:9px;background:var(--soft);min-height:96px}.idxName{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.idxCode{font-size:10px;color:var(--muted);margin-left:3px}.idxPrice{font-size:20px;font-weight:900;margin:3px 0}.idxMeta{font-size:12px;font-weight:700}.red{color:var(--red)!important}.green{color:var(--green)!important}.muted{color:var(--muted)}.boards{display:grid;grid-template-columns:1fr 1fr;gap:12px}.rank{width:100%;border-collapse:collapse}.rank th,.rank td{padding:9px 6px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}.rank th{color:var(--muted);font-weight:600}.rank td:last-child,.rank th:last-child{text-align:right}.err{color:var(--amber)}.signalBox{border:1px solid var(--line);border-radius:16px;padding:14px;background:linear-gradient(135deg,rgba(23,92,211,.09),rgba(217,45,32,.06))}.signalTop{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.signalTitle{font-size:15px;color:var(--muted)}.signalBadge{font-size:26px;font-weight:900;border-radius:999px;padding:7px 14px;background:var(--card);border:1px solid var(--line)}.signalBadge.buy{color:var(--red)}.signalBadge.sell{color:var(--green)}.signalBadge.neutral{color:var(--amber)}.signalGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}.metric{border:1px solid var(--line);border-radius:12px;padding:9px;background:var(--soft)}.metric b{display:block;font-size:16px}.reason{margin:12px 0 0;padding-left:18px}.reason li{margin:5px 0}.signalNote{margin-top:10px}.tagLine{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.tag{border:1px solid var(--line);border-radius:999px;padding:4px 9px;font-size:12px;color:var(--muted);background:var(--card)}body.dark .count{background:#102a56;border-color:#1d4ed8}@media(max-width:760px){main{padding:10px 7px 28px}.top,.boards{grid-template-columns:1fr}.idxGrid{grid-template-columns:repeat(3,1fr);gap:5px}.idx{padding:6px;min-height:88px}.idxName{font-size:11px}.idxCode{display:block;margin-left:0}.idxPrice{font-size:15px}.idxMeta{font-size:10px}.marketGrid{grid-template-columns:repeat(3,1fr);gap:6px}.statusCard{padding:8px}.status{font-size:17px}.count strong{font-size:28px}.rank th,.rank td{font-size:13px;padding:8px 4px}h1{font-size:22px}.themeBtn{padding:7px 11px;font-size:12px}.signalGrid{grid-template-columns:repeat(2,1fr)}.signalBadge{font-size:22px}}</style></head><body><main><header><div class="headerTop"><h1>A股行情看板</h1><button id="themeBtn" class="themeBtn" type="button">深色</button></div><p>5分钟自动刷新页面，重新获取行情和板块排行。</p><p class="small" style="color:rgba(255,255,255,.82)">红色为上涨/领涨，绿色为下跌/领跌；行情来自公开接口，可能存在延迟。</p></header><section class="top"><div class="count"><div class="small">距离下次刷新</div><strong id="countdown">300秒</strong><div class="small" id="nextTime">正在计算</div><p><button onclick="location.reload()">立即刷新</button></p></div><div><h2>开市 / 休市</h2><div class="marketGrid"><div class="statusCard"><b>A股</b><div id="cnStatus" class="status closed">--</div><div id="cnHint" class="small">判断中</div></div><div class="statusCard"><b>港股</b><div id="hkStatus" class="status closed">--</div><div id="hkHint" class="small">判断中</div></div><div class="statusCard"><b>美股</b><div id="usStatus" class="status closed">--</div><div id="usHint" class="small">判断中</div></div></div></div></section><section><h2>行情信息</h2><div id="quoteTime" class="small">正在获取行情...</div><div id="indices" class="idxGrid"></div></section><section><div class="boards"><div><h2>领涨板块排行</h2><table class="rank"><thead><tr><th>排名</th><th>板块</th><th>涨幅</th></tr></thead><tbody id="upBoards"><tr><td colspan="3">加载中...</td></tr></tbody></table></div><div><h2>领跌板块排行</h2><table class="rank"><thead><tr><th>排名</th><th>板块</th><th>跌幅</th></tr></thead><tbody id="downBoards"><tr><td colspan="3">加载中...</td></tr></tbody></table></div></div></section><section id="techSignalSection"><h2>科技板块买入信号</h2><div id="techSignal" class="signalBox"><div class="muted">正在根据最新市场方向、行情涨跌和板块强弱生成决策信号...</div></div></section></main><script>const REFRESH_SECONDS=300,startedAt=Date.now(),nextAt=startedAt+REFRESH_SECONDS*1000,$=id=>document.getElementById(id),pad=n=>String(n).padStart(2,'0');let quoteMap=new Map(),upBoardData=[],downBoardData=[];function setTheme(t){document.body.classList.toggle('dark',t==='dark');const b=$('themeBtn');if(b)b.textContent=t==='dark'?'亮色':'深色'}function initTheme(){let t='light';try{t=localStorage.getItem('quoteTheme')||'light'}catch(e){}setTheme(t);const b=$('themeBtn');if(b)b.onclick=()=>{const n=document.body.classList.contains('dark')?'light':'dark';try{localStorage.setItem('quoteTheme',n)}catch(e){}setTheme(n)}}initTheme();const targets=[['1.000001','上证指数'],['0.399006','创业板指'],['1.000688','科创50'],['1.000300','沪深300'],['124.HSTECH','恒生科技指数'],['100.NDX','纳斯达克100'],['1.512480','半导体ETF国联安'],['0.159819','人工智能ETF易方达'],['1.518880','黄金ETF华安']];function jsonp(url){return new Promise((resolve,reject)=>{const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);window[cb]=d=>{delete window[cb];s.remove();resolve(d)};const s=document.createElement('script');s.onerror=()=>{delete window[cb];s.remove();reject(Error('接口失败'))};s.src=url+(url.includes('?')?'&':'?')+'cb='+cb;document.body.appendChild(s);setTimeout(()=>{if(window[cb]){delete window[cb];s.remove();reject(Error('接口超时'))}},9000)})}function cls(v){return Number(v)>=0?'red':'green'}function fmt(v,d=2){return v===undefined||v===null||v==='-'?'--':Number(v).toFixed(d)}function money(v){if(v==='-'||v==null)return'--';v=Number(v);if(v>=1e8)return(v/1e8).toFixed(1)+'亿';if(v>=1e4)return(v/1e4).toFixed(1)+'万';return v.toFixed(0)}function avg(arr){arr=arr.filter(v=>Number.isFinite(v));return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:NaN}function pct(code){const x=quoteMap.get(code);return x?Number(x.f3):NaN}function parts(date,tz){const f=new Intl.DateTimeFormat('en-US',{timeZone:tz,weekday:'short',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}),o={};f.formatToParts(date).forEach(p=>o[p.type]=p.value);return o}function mins(p){return Number(p.hour)*60+Number(p.minute)}function weekday(p){return!['Sat','Sun'].includes(p.weekday)}function setStatus(k,state,hint){const el=$(k+'Status');el.textContent=state;el.className='status '+(state==='开市'?'open':state==='午间休市'?'pause':'closed');$(k+'Hint').textContent=hint}function marketStatus(){const now=new Date();let p=parts(now,'Asia/Shanghai'),m=mins(p),d=weekday(p);if(!d)setStatus('cn','休市','周末');else if(m>=570&&m<690)setStatus('cn','开市','09:30-11:30');else if(m>=690&&m<780)setStatus('cn','午间休市','13:00继续');else if(m>=780&&m<900)setStatus('cn','开市','13:00-15:00');else setStatus('cn','休市','常规09:30-15:00');p=parts(now,'Asia/Hong_Kong');m=mins(p);d=weekday(p);if(!d)setStatus('hk','休市','周末');else if(m>=570&&m<720)setStatus('hk','开市','09:30-12:00');else if(m>=720&&m<780)setStatus('hk','午间休市','13:00继续');else if(m>=780&&m<960)setStatus('hk','开市','13:00-16:00');else setStatus('hk','休市','常规09:30-16:00');p=parts(now,'America/New_York');m=mins(p);d=weekday(p);if(!d)setStatus('us','休市','美东周末');else if(m>=570&&m<960)setStatus('us','开市','美东09:30-16:00');else setStatus('us','休市','美东09:30-16:00')}async function loadIndices(){try{const secids=targets.map(t=>t[0]).join(','),url='https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&invt=2&fields=f12,f14,f2,f3,f4,f6&secids='+secids,d=await jsonp(url);quoteMap=new Map((d?.data?.diff||[]).map(x=>[x.f12,x]));$('quoteTime').textContent='更新时间：'+new Date().toLocaleString('zh-CN');$('indices').innerHTML=targets.map(([secid,name])=>{const code=secid.split('.')[1],x=quoteMap.get(code);if(!x)return'<div class="idx"><div class="idxName">'+name+'<span class="idxCode">'+code+'</span></div><div class="idxPrice muted">--</div><div class="small">暂无数据</div></div>';return'<div class="idx"><div class="idxName">'+name+'<span class="idxCode">'+x.f12+'</span></div><div class="idxPrice '+cls(x.f3)+'">'+fmt(x.f2,x.f2<10?3:2)+'</div><div class="idxMeta '+cls(x.f3)+'">'+fmt(x.f3)+'%　'+fmt(x.f4,x.f2<10?3:2)+'</div><div class="small">成交额 '+money(x.f6)+'</div></div>'}).join('');evaluateTechSignal()}catch(e){$('quoteTime').innerHTML='<span class="err">行情获取失败，5分钟后自动重试。</span>';evaluateTechSignal()}}async function loadBoards(){const fields='f12,f14,f3,f2',base='https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=10&np=1&fltt=2&invt=2&ut=bd1d9ddb04089700cf9c27f6f7426281&fs=m:90+t:2&fields='+fields;try{let up=await jsonp(base+'&fid=f3&po=1'),down=await jsonp(base+'&fid=f3&po=0');upBoardData=up?.data?.diff||[];downBoardData=down?.data?.diff||[];renderBoards('upBoards',upBoardData,true);renderBoards('downBoards',downBoardData,false);evaluateTechSignal()}catch(e){$('upBoards').innerHTML='<tr><td colspan="3" class="err">板块数据获取失败</td></tr>';$('downBoards').innerHTML='<tr><td colspan="3" class="err">板块数据获取失败</td></tr>';evaluateTechSignal()}}function renderBoards(id,arr,isUp){$(id).innerHTML=arr.map((x,i)=>'<tr><td>'+(i+1)+'</td><td>'+x.f14+'<br><span class="small">'+x.f12+'</span></td><td class="'+(isUp?'red':'green')+'">'+fmt(x.f3)+'%</td></tr>').join('')||'<tr><td colspan="3">暂无数据</td></tr>'}function isTechBoard(x){return /科技|半导体|芯片|人工智能|AI|算力|软件|通信|电子|元件|光学|数字|集成电路|印制电路|PCB|云计算|计算机|互联网/i.test(x?.f14||'')}function chooseSignal(m){let s='不加不减',type='neutral',action='市场方向不够明确，暂不主动加减仓。';if(!Number.isFinite(m.techAvg)){s='不考虑';type='sell';action='行情数据不足，暂不作为买入依据。'}else if(m.techAvg>=8){s='逃顶';type='sell';action='科技方向短线过热，优先保护利润。'}else if(m.techAvg>=4&&m.downTech>0){s='止盈减仓';type='sell';action='涨幅较大但已有科技分支转弱，分批止盈。'}else if(m.techAvg>=3&&m.upTech>=2){s='乘胜加仓';type='buy';action='科技方向强势且板块榜验证，可顺势小幅加仓。'}else if(m.techAvg>=3){s='避免追高';type='neutral';action='涨幅已经偏大，但板块共振不足，不追高。'}else if(m.techAvg>=1&&m.relative>=0){s='机会';type='buy';action='科技表现强于大盘，可列为买入候选。'}else if(m.techAvg>=0){s='持有';type='neutral';action='科技方向未破坏，已有仓位可继续观察。'}else if(m.techAvg<=-6&&m.downTech>=2){s='超跌';type='neutral';action='跌幅较深，先等止跌信号，避免盲目抄底。'}else if(m.techAvg<=-3){s='止损减仓';type='sell';action='科技核心标的明显走弱，先控制仓位风险。'}else if(m.techAvg<0&&m.relative>0){s='低吸加仓';type='buy';action='科技虽回调但相对大盘更强，可轻仓低吸。'}else if(m.techAvg<0){s='买入候选';type='neutral';action='回调中但尚未确认转强，先观察候选。'}return{signal:s,type,action}}function evaluateTechSignal(){const el=$('techSignal');if(!el)return;const m={techAvg:avg([pct('399006'),pct('000688'),pct('HSTECH'),pct('NDX'),pct('512480'),pct('159819')]),coreAvg:avg([pct('399006'),pct('000688'),pct('512480'),pct('159819')]),marketAvg:avg([pct('000001'),pct('000300')]),semi:pct('512480'),ai:pct('159819'),gold:pct('518880'),upTech:upBoardData.slice(0,10).filter(isTechBoard).length,downTech:downBoardData.slice(0,10).filter(isTechBoard).length};m.relative=Number.isFinite(m.techAvg)&&Number.isFinite(m.marketAvg)?m.techAvg-m.marketAvg:NaN;const r=chooseSignal(m),clsName=r.type==='buy'?'buy':r.type==='sell'?'sell':'neutral';const reasons=[];reasons.push('科技核心均值 '+fmt(m.techAvg)+'%，大盘均值 '+fmt(m.marketAvg)+'%，相对强弱 '+fmt(m.relative)+' 个百分点。');reasons.push('半导体ETF '+fmt(m.semi)+'%，人工智能ETF '+fmt(m.ai)+'%，科创50/创业板同步纳入判断。');reasons.push('领涨榜科技相关 '+m.upTech+' 个，领跌榜科技相关 '+m.downTech+' 个，用于判断资金方向和风险扩散。');if(Number.isFinite(m.gold)&&m.gold>1)reasons.push('黄金ETF上涨 '+fmt(m.gold)+'%，避险偏好升温，科技仓位不宜过重。');el.innerHTML='<div class="signalTop"><div><div class="signalTitle">当前决策信号</div><div class="signalNote">'+r.action+'</div></div><div class="signalBadge '+clsName+'">'+r.signal+'</div></div><div class="signalGrid"><div class="metric"><span class="small">科技均值</span><b class="'+cls(m.techAvg)+'">'+fmt(m.techAvg)+'%</b></div><div class="metric"><span class="small">大盘均值</span><b class="'+cls(m.marketAvg)+'">'+fmt(m.marketAvg)+'%</b></div><div class="metric"><span class="small">科技领涨</span><b class="red">'+m.upTech+' 个</b></div><div class="metric"><span class="small">科技领跌</span><b class="green">'+m.downTech+' 个</b></div></div><ul class="reason">'+reasons.map(x=>'<li>'+x+'</li>').join('')+'</ul><div class="tagLine"><span class="tag">持有</span><span class="tag">机会</span><span class="tag">逃顶</span><span class="tag">超跌</span><span class="tag">不加不减</span><span class="tag">乘胜加仓</span><span class="tag">止盈减仓</span><span class="tag">止损减仓</span><span class="tag">低吸加仓</span><span class="tag">避免追高</span><span class="tag">买入候选</span><span class="tag">不考虑</span></div><div class="small signalNote">仅按页面可获取的公开行情做自动判断，不构成投资建议。</div>'}function updateClock(){const left=Math.max(0,Math.ceil((nextAt-Date.now())/1000));$('countdown').textContent=Math.floor(left/60)+':'+pad(left%60)+'（'+left+'秒）';const d=new Date(nextAt);$('nextTime').textContent='预计刷新：'+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());document.title=left+'秒后刷新 · A股行情看板';marketStatus();if(left<=0)location.reload()}updateClock();setInterval(updateClock,1000);loadIndices();loadBoards();</script></body></html>
