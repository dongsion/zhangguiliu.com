<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>每日财经报告</title>
  <style>
    body{margin:0;background:#f6f8fb;color:#182230;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;line-height:1.7}
    main{max-width:820px;margin:0 auto;padding:24px 14px 48px}
    header{background:linear-gradient(135deg,#175cd3,#0b2f6b);color:white;border-radius:20px;padding:28px 20px;box-shadow:0 12px 30px rgba(16,24,40,.12)}
    h1{margin:0 0 8px;font-size:28px} h2{font-size:20px;margin-top:0}
    section{background:white;border:1px solid #d9e2ec;border-radius:18px;padding:18px;margin:14px 0;box-shadow:0 6px 20px rgba(16,24,40,.05)}
    .muted{color:#667085}.badge{display:inline-block;background:rgba(255,255,255,.18);padding:5px 10px;border-radius:999px;margin-top:8px;font-size:13px}
    .countdown{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:#eff6ff;border:1px solid #bfdbfe;border-radius:16px;padding:16px;margin-top:14px}
    .countdown strong{font-size:34px;color:#175cd3;letter-spacing:.5px}.small{font-size:13px;color:#667085}
    button{border:0;background:#175cd3;color:#fff;border-radius:999px;padding:10px 16px;font-size:15px}
    a{color:#175cd3;text-decoration:none} a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <main>
    <header>
      <h1>每日财经报告</h1>
      <p>手机 5G 访问页面已创建。</p>
      <p style="color:rgba(255,255,255,.82)">页面每 10 分钟自动刷新一次。</p>
      <span class="badge">公开信息整理 · 非投资建议</span>
    </header>
    <section>
      <h2>刷新倒计时</h2>
      <div class="countdown">
        <div>
          <div class="small">距离下次自动刷新还有</div>
          <strong id="countdown">600 秒</strong>
          <div class="small" id="nextTime">正在计算下次刷新时间...</div>
        </div>
        <button onclick="location.reload()">立即刷新</button>
      </div>
    </section>
    <section>
      <h2>当前状态</h2>
      <p>网页已发布到 GitHub Pages，手机可以通过固定网址查看。</p>
      <p>倒计时归零后，页面会自动重新载入。</p>
    </section>
    <section>
      <h2>说明</h2>
      <p>目前这是轻量版首页，用于先确认手机能打开网页。后续可以继续把本地每 10 分钟生成的财经报告同步到这里。</p>
      <p class="muted">本页面不构成任何证券、基金、期货、外汇或其他金融产品的投资建议。</p>
    </section>
  </main>
  <script>
    const REFRESH_SECONDS = 600;
    const startedAt = Date.now();
    const nextAt = startedAt + REFRESH_SECONDS * 1000;
    const countdownEl = document.getElementById('countdown');
    const nextTimeEl = document.getElementById('nextTime');
    function pad(n){return String(n).padStart(2,'0')}
    function update(){
      const left = Math.max(0, Math.ceil((nextAt - Date.now()) / 1000));
      const min = Math.floor(left / 60);
      const sec = left % 60;
      countdownEl.textContent = `${min}:${pad(sec)}（${left} 秒）`;
      const d = new Date(nextAt);
      nextTimeEl.textContent = `预计刷新时间：${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      document.title = `剩余 ${left} 秒 · 每日财经报告`;
      if(left <= 0){ location.reload(); }
    }
    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
